# JitPack build configuration
# Ensures the project is built with JDK 25 on JitPack's servers.
# JitPack installs JDKs through SDKMAN, so we request 25 explicitly
# before the default `mvn install -DskipTests` build runs.
before_install:
  - sdk install java 25-open
  - sdk use java 25-open

install:
  - mvn install -DskipTests
